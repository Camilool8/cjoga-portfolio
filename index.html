    <!-- Theme bootstrap — paints in the correct theme on first frame.
         Mirrors Docusaurus's three-state model: localStorage "light" or
         "dark" is an explicit user choice; anything else (including no
         entry) is "system" and resolves to prefers-color-scheme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var pref =
            stored === "light" || stored === "dark" ? stored : "system";
          var theme =
            pref === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : pref;
          document.documentElement.setAttribute("data-theme", theme);
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {
          /* localStorage unavailable in private browsing — CSS default. */
        }
      })();
    </script>
