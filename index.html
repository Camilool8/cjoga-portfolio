    <!-- Theme bootstrap — runs before React mounts so the page paints in
         the correct theme on first frame. Mirrors Docusaurus's
         three-state model: localStorage "light" or "dark" is an
         explicit user choice; anything else (including no entry) is
         "system" and resolves to the OS's prefers-color-scheme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var pref =
            stored === "light" || stored === "dark" ? stored : "system";
          var theme =
            pref === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : pref;
          document.documentElement.setAttribute("data-theme", theme);
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {
          // localStorage may be unavailable in private browsing — fall
          // through to the CSS default.
        }
      })();
    </script>
