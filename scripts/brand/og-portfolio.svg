<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#04060b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64FFDA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#64FFDA" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#64FFDA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#64FFDA" fill-opacity="0.10"/>
    </pattern>
  </defs>

  <!-- Base + atmospheric layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <circle cx="100" cy="80" r="360" fill="url(#orb1)"/>
  <circle cx="1120" cy="600" r="420" fill="url(#orb2)"/>

  <!-- Masthead — thin top rule + meta -->
  <line x1="64" y1="80" x2="1136" y2="80" stroke="#64FFDA" stroke-opacity="0.22" stroke-width="1"/>
  <g transform="translate(64 60)">
    <text fill="#64FFDA" font-family="Menlo, Monaco, 'Courier New', monospace"
          font-size="13" font-weight="500" letter-spacing="0.22em">CJOGA.CLOUD · DEVOPS HANDBOOK · EST. 2021</text>
  </g>
  <g transform="translate(1136 60)" text-anchor="end">
    <text fill="rgba(136,146,176,0.7)" font-family="Menlo, Monaco, 'Courier New', monospace"
          font-size="13" font-weight="500" letter-spacing="0.22em" text-anchor="end">VOL. I — PORTFOLIO</text>
  </g>

  <!-- Brand mark (cloud + CJ) + URL chip -->
  <g transform="translate(64 124)">
    <rect width="78" height="78" rx="16" fill="#0a0e1a" stroke="#64FFDA" stroke-opacity="0.28" stroke-width="1"/>
    <g transform="translate(11 11) scale(0.22)">
      <g fill="url(#brand)">
        <circle cx="90" cy="86" r="22"/>
        <circle cx="128" cy="68" r="30"/>
        <circle cx="168" cy="86" r="24"/>
        <rect x="74" y="92" width="110" height="26" rx="13"/>
      </g>
      <text x="128" y="204"
            fill="url(#brand)"
            font-family="ui-monospace, Menlo, 'JetBrains Mono', 'Courier New', monospace"
            font-size="118" font-weight="900"
            text-anchor="middle" letter-spacing="-0.04em">CJ</text>
    </g>
  </g>
  <g transform="translate(164 153)">
    <rect width="206" height="42" rx="10" fill="rgba(100,255,218,0.06)"
          stroke="rgba(100,255,218,0.22)" stroke-width="1"/>
    <text x="18" y="27" fill="#64FFDA"
          font-family="Menlo, Monaco, 'Courier New', monospace"
          font-size="17" font-weight="500" letter-spacing="0.04em">~/cjoga.cloud</text>
  </g>

  <!-- Eyebrow — small accented line that frames the name -->
  <g transform="translate(64 256)">
    <circle cx="6" cy="-7" r="6" fill="#64FFDA"/>
    <text x="22" y="0" fill="#64FFDA"
          font-family="Menlo, Monaco, 'Courier New', monospace"
          font-size="18" font-weight="500" letter-spacing="0.22em">DEVOPS &amp; CLOUD ENGINEER</text>
    <line x1="430" y1="-7" x2="900" y2="-7" stroke="#64FFDA" stroke-opacity="0.22" stroke-width="1"/>
  </g>

  <!-- Name — the masthead, set big and tight -->
  <g transform="translate(64 380)">
    <text font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="100" font-weight="800" letter-spacing="-0.045em">
      <tspan x="0" y="0" fill="#f1f5f9">Jose Camilo</tspan>
      <tspan x="0" y="104" fill="url(#brand)">Joga Guerrero.</tspan>
    </text>
  </g>

  <!-- Short accent rule below the name, anchored bottom-left. -->
  <line x1="64" y1="560" x2="180" y2="560" stroke="#64FFDA" stroke-opacity="0.7" stroke-width="2"/>
</svg>
