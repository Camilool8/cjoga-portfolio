<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="surface" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#06080d"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64FFDA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- Rounded dark tile -->
  <rect width="256" height="256" rx="56" fill="url(#surface)"/>

  <!-- Hairline inner border -->
  <rect x="1" y="1" width="254" height="254" rx="55"
        fill="none" stroke="#64FFDA" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Cloud — three overlapping pillows + a flat rounded base. Drawing
       it as a union of solid shapes (rather than a hand-tuned path) keeps
       the silhouette smooth and symmetrical when rasterized to 16/32px. -->
  <g fill="url(#brand)">
    <circle cx="90" cy="86" r="22"/>
    <circle cx="128" cy="68" r="30"/>
    <circle cx="168" cy="86" r="24"/>
    <rect x="74" y="92" width="110" height="26" rx="13"/>
  </g>

  <!-- "CJ" — wide, bold, monospace. Centered horizontally; sits on a strong
       baseline at y=204 with caps reaching up to ~y=126. -->
  <text x="128" y="204"
        fill="url(#brand)"
        font-family="ui-monospace, Menlo, 'JetBrains Mono', 'Courier New', monospace"
        font-size="118" font-weight="900"
        text-anchor="middle" letter-spacing="-0.04em">CJ</text>

  <!-- Subtle bottom corner notch — asymmetry detail, invisible at favicon size. -->
  <path d="M 256 232 L 232 256 L 256 256 Z" fill="#64FFDA" fill-opacity="0.18"/>
</svg>
