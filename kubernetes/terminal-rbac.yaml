---
# 1. ServiceAccount for terminal readonly access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: terminal-readonly
  namespace: web-development
---
# 2. ClusterRole granting read-only access to specific resources ONLY
# Allowed: pods, deployments, services, nodes, namespaces
# Denied: configmaps, secrets, CRDs, and everything else
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: terminal-viewer
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces", "services"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
# 3. ClusterRoleBinding (needed for cluster-scoped resources: nodes, namespaces)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: terminal-viewer-binding
subjects:
  - kind: ServiceAccount
    name: terminal-readonly
    namespace: web-development
roleRef:
  kind: ClusterRole
  name: terminal-viewer
  apiGroup: rbac.authorization.k8s.io
