name: Build & push Docker images

# Triggers:
#   - push to main → build whichever image's files changed
#   - workflow_dispatch → force-build both, useful for re-rolling after
#     base-image security updates without touching app code
on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid stacking redundant runs if you push twice in a row to main.
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which app changed so we don't rebuild images on doc-only
  # commits or when only the sibling app's files moved.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      portfolio: ${{ steps.filter.outputs.portfolio }}
      blog: ${{ steps.filter.outputs.blog }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            portfolio:
              - 'src/**'
              - 'server/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'Dockerfile'
              - '.dockerignore'
              - 'vite.config.js'
              - 'tailwind.config.js'
              - 'postcss.config.js'
              - 'index.html'
              - '.github/workflows/build-images.yaml'
            blog:
              - 'blog-site/**'
              - '.github/workflows/build-images.yaml'

  portfolio:
    name: Build cjoga/portfolio
    needs: changes
    if: needs.changes.outputs.portfolio == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: cjoga/portfolio
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=portfolio
          cache-to: type=gha,mode=max,scope=portfolio
          provenance: false

  blog:
    name: Build cjoga/blog
    needs: changes
    if: needs.changes.outputs.blog == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: cjoga/blog
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: blog-site
          file: blog-site/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=blog
          cache-to: type=gha,mode=max,scope=blog
          provenance: false
